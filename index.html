<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Static Web App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <img src="assets/logo.png" alt="Logo" class="logo" />
    <nav>
      <ul>
        <li><a href="#home" class="active">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="home" class="section">
      <h1>Welcome to My Static Web App</h1>
      <p>This is a simple, clean, and attractive static website.</p>
      <button id="alertBtn">Click Me!</button>
    </section>

    <section id="about" class="section">
      <h2>About Us</h2>
      <p>We build beautiful static websites that are fast and easy to maintain.</p>
    </section>

    <section id="contact" class="section">
      <h2>Contact</h2>
      <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" required />

        <label for="message">Message:</label>
        <textarea id="message" rows="4" required></textarea>

        <button type="submit">Send</button>
      </form>
      <p id="formMessage"></p>
    </section>
  </main>

  <footer>
    &copy; 2024 Your Name
  </footer>

  <script src="script.js"></script>
</body>
</html>
